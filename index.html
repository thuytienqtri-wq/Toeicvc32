<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Game - Topic 32</title>
    <style>
        :root { --primary: #059669; --success: #10b981; --danger: #ef4444; --bg: #ecfdf5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; }
        .game-card { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; text-align: center; margin-top: 10px; }
        .scrambled-word { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 4px; margin: 15px 0; text-transform: uppercase; background: #f0fdf4; padding: 15px; border-radius: 10px; border: 2px dashed #34d399; }
        .meaning { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        input { width: 90%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; text-align: center; margin-bottom: 10px; outline: none; -webkit-appearance: none; }
        .btn-check { width: 95%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        .btn-check:active { background: #047857; transform: scale(0.98); }
        .message { margin-top: 10px; font-weight: bold; min-height: 45px; font-size: 15px; line-height: 1.4; }
        .correct { color: var(--success); }
        .wrong { color: var(--danger); }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="game-card" id="game-container">
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="pos-hint" style="font-size: 12px; color: #64748b; font-style: italic;">LOẠI TỪ</div>
    <div class="meaning" id="vietnamese-meaning">NGHĨA TIẾNG VIỆT</div>
    <div class="scrambled-word" id="scrambled">WORD</div>
    
    <input type="text" id="user-input" placeholder="Nhập đáp án..." autocomplete="off" novalidate>
    <button class="btn-check" id="check-btn">KIỂM TRA</button>
    <div class="message" id="message"></div>
    
    <div style="margin-top: 15px; display: flex; justify-content: space-between; color: #94a3b8; font-size: 13px;">
        <span>Câu: <span id="current-idx">1</span>/12</span>
        <span>Điểm: <span id="score">0</span></span>
    </div>
</div>

<script>
    const topic32Data = [
        { w: "Appreciate", m: "Cảm kích, đánh giá cao", p: "Verb" },
        { w: "Be exposed to", m: "Được tiếp xúc với", p: "Verb Phrase" },
        { w: "Bring in", m: "Thuê mướn / Tuyển dụng", p: "Verb Phrase" },
        { w: "Casual", m: "Không trang trọng, bình thường", p: "Adjective" },
        { w: "Code", m: "Quy tắc / Mã số", p: "Noun" },
        { w: "Consume", m: "Tiêu dùng, tiêu thụ", p: "Verb" },
        { w: "Glimpse", m: "Nhìn lướt qua", p: "Noun/Verb" },
        { w: "Outdated", m: "Lỗi thời, cổ xưa", p: "Adjective" },
        { w: "Practice", m: "Thực hành / Thói quen", p: "Noun/Verb" },
        { w: "Reinforce", m: "Tăng cường, củng cố", p: "Verb" },
        { w: "Strategy", m: "Chiến lược", p: "Noun" },
        { w: "Verbal", m: "Bằng lời nói", p: "Adjective" }
    ];

    let currentIdx = 0, score = 0, wrongCount = 0, isWaiting = false;
    const inputField = document.getElementById('user-input');
    const checkBtn = document.getElementById('check-btn');

    function scramble(word) {
        let cleanWord = word.replace(/\s/g, "").toUpperCase();
        let arr = cleanWord.split("");
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return (arr.join("") === cleanWord) ? scramble(word) : arr.join("");
    }

    function render() {
        if (currentIdx >= topic32Data.length) {
            document.getElementById('game-container').innerHTML = `
                <h2 style="color: var(--primary)">Hoàn thành!</h2>
                <p>Kết quả của em: <strong style="font-size: 24px">${score}/12</strong></p>
                <button onclick="location.reload()" class="btn-check">Luyện tập lại</button>`;
            return;
        }

        const data = topic32Data[currentIdx];
        document.getElementById('pos-hint').innerText = `Loại từ: ${data.p}`;
        document.getElementById('vietnamese-meaning').innerText = data.m;
        document.getElementById('scrambled').innerText = scramble(data.w);
        
        inputField.value = "";
        inputField.disabled = false;
        checkBtn.disabled = false;
        document.getElementById('message').innerText = "";
        document.getElementById('current-idx').innerText = currentIdx + 1;
        document.getElementById('score').innerText = score;
        document.getElementById('progress').style.width = `${(currentIdx / 12) * 100}%`;
        
        wrongCount = 0;
        isWaiting = false;
        setTimeout(() => inputField.focus(), 300);
    }

    function handleCheck() {
        if (isWaiting || inputField.disabled) return;
        
        const input = inputField.value.trim().toLowerCase().replace(/\s/g, "");
        const correctWord = topic32Data[currentIdx].w.toLowerCase().replace(/\s/g, "");
        const msg = document.getElementById('message');

        if (input === correctWord) {
            msg.innerText = "Giỏi lắm! +1 điểm";
            msg.className = "message correct";
            score++;
            isWaiting = true;
            setTimeout(() => { currentIdx++; render(); }, 1000);
        } else {
            wrongCount++;
            if (wrongCount >= 2) {
                isWaiting = true;
                inputField.disabled = true;
                checkBtn.disabled = true;
                msg.innerHTML = `Đáp án đúng là: <br><span style="color:var(--primary); font-size: 20px">${topic32Data[currentIdx].w.toUpperCase()}</span>`;
                msg.className = "message wrong";
                setTimeout(() => { currentIdx++; render(); }, 2500);
            } else {
                msg.innerText = "Chưa đúng! Em hãy thử lại nhé.";
                msg.className = "message wrong";
                inputField.value = "";
                inputField.focus();
            }
        }
    }

    checkBtn.addEventListener('click', handleCheck);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleCheck(); });
    
    inputField.addEventListener('focus', () => {
        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 400);
    });

    render();
</script>
</body>
</html>
